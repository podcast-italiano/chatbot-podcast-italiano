<!-- Podcast Italiano Chatbot Widget -->
<style>
  #pi-chat-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #1a1a2e;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 24px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }
  #pi-chat-btn:hover { transform: scale(1.08); }

  #pi-chat-window {
    position: fixed;
    bottom: 92px;
    right: 24px;
    width: 360px;
    max-height: 520px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    display: none;
    flex-direction: column;
    z-index: 9999;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  #pi-chat-window.open { display: flex; }

  #pi-chat-header {
    background: #1a1a2e;
    color: white;
    padding: 16px 20px;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #pi-chat-header span { font-size: 20px; }

  #pi-chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 360px;
  }

  .pi-msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .pi-msg.bot {
    background: #f0f0f0;
    color: #1a1a1a;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .pi-msg.user {
    background: #1a1a2e;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .pi-msg a { color: inherit; text-decoration: underline; }

  .pi-typing {
    display: flex;
    gap: 4px;
    padding: 10px 14px;
    background: #f0f0f0;
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    width: fit-content;
  }
  .pi-typing span {
    width: 7px;
    height: 7px;
    background: #999;
    border-radius: 50%;
    animation: pi-bounce 1.2s infinite;
  }
  .pi-typing span:nth-child(2) { animation-delay: 0.2s; }
  .pi-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pi-bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  #pi-chat-input-area {
    padding: 12px 16px;
    border-top: 1px solid #eee;
    display: flex;
    gap: 8px;
  }
  #pi-chat-input {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 14px;
    outline: none;
    resize: none;
    font-family: inherit;
  }
  #pi-chat-input:focus { border-color: #1a1a2e; }
  #pi-chat-send {
    background: #1a1a2e;
    color: white;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    cursor: pointer;
    font-size: 16px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #pi-chat-send:disabled { opacity: 0.5; cursor: default; }

  @media (max-width: 400px) {
    #pi-chat-window { width: calc(100vw - 32px); right: 16px; }
  }
</style>

<button id="pi-chat-btn" aria-label="Open chat">💬</button>

<div id="pi-chat-window">
  <div id="pi-chat-header">
    <span>🇮🇹</span> Podcast Italiano
  </div>
  <div id="pi-chat-messages"></div>
  <div id="pi-chat-input-area">
    <textarea id="pi-chat-input" rows="1" placeholder="Ask me anything..."></textarea>
    <button id="pi-chat-send">➤</button>
  </div>
</div>

<script>
(function () {
  const BACKEND_URL = 'https://YOUR_VERCEL_URL/api/chat'; // replace after deploy
  const WELCOME_MSG = "Hi! I'm the Podcast Italiano assistant. How can I help you today? 😊";

  const btn = document.getElementById('pi-chat-btn');
  const win = document.getElementById('pi-chat-window');
  const msgs = document.getElementById('pi-chat-messages');
  const input = document.getElementById('pi-chat-input');
  const send = document.getElementById('pi-chat-send');

  let history = [];
  let isOpen = false;
  let initialized = false;

  btn.addEventListener('click', function () {
    isOpen = !isOpen;
    win.classList.toggle('open', isOpen);
    btn.textContent = isOpen ? '✕' : '💬';
    if (isOpen && !initialized) {
      addMessage('bot', WELCOME_MSG);
      initialized = true;
    }
    if (isOpen) input.focus();
  });

  send.addEventListener('click', sendMessage);
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function addMessage(role, text) {
    const el = document.createElement('div');
    el.className = 'pi-msg ' + role;
    el.innerHTML = linkify(text);
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
    return el;
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'pi-typing';
    el.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
    return el;
  }

  function linkify(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || send.disabled) return;

    input.value = '';
    send.disabled = true;
    addMessage('user', text);
    history.push({ role: 'user', content: text });

    const typing = showTyping();

    try {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      typing.remove();

      if (data.reply) {
        addMessage('bot', data.reply);
        history.push({ role: 'assistant', content: data.reply });
      } else {
        addMessage('bot', 'Sorry, something went wrong. Please try again or write to info@podcastitaliano.com');
      }
    } catch (e) {
      typing.remove();
      addMessage('bot', 'Sorry, I could not connect. Please write to info@podcastitaliano.com');
    }

    send.disabled = false;
    input.focus();
  }
})();
</script>
